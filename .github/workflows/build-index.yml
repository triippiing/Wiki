name: Build index

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'scripts/build_index.py'
      - '.github/workflows/build-index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build index.html + sidebar nav
        run: python3 scripts/build_index.py

      - name: Commit regenerated files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # nav-data.js feeds the sidebar rail and is generated by the same
          # script — stage it alongside index.html or the rail goes stale as
          # soon as a runbook is added.
          if git diff --quiet -- index.html assets/js/nav-data.js; then
            echo "No changes to index.html or nav-data.js"
          else
            git add index.html assets/js/nav-data.js
            git commit -m "build: regenerate index.html + nav-data.js [skip ci]"
            git push
          fi
